<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SajdaFinder V2 - Final Master Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --black: #111111; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: var(--black); -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .font-arabic { font-family: 'Amiri', serif; }
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-active { border-bottom: 5px solid var(--black); color: var(--black) !important; font-weight: 900; }
        .bottom-nav-active { background-color: var(--gold) !important; color: var(--black) !important; transform: scale(1.1); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .counter-circle { width: 220px; height: 220px; border-radius: 50%; border: 12px solid var(--black); display: flex; align-items: center; justify-content: center; font-size: 5rem; font-weight: 900; margin: 0 auto; background: #fff; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .safe-click { cursor: pointer; touch-action: manipulation; }
        .settings-card { background: white; border-radius: 1.5rem; border: 1px solid #f1f1f1; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        #compass-ui { transition: transform 0.2s ease-out; }
        .img-slot { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="pb-32">

    <!-- HEADER -->
    <header class="bg-black text-white px-6 py-6 flex justify-between items-center sticky top-0 z-[1000] shadow-xl">
        <div class="flex items-center gap-3">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            <span class="text-2xl font-black tracking-tighter uppercase">SajdaFinder <span class="text-[#c5a059]">V2</span></span>
        </div>
        <div id="head-profile-img" class="w-10 h-10 rounded-full border-2 border-[#c5a059] flex items-center justify-center bg-gray-800 safe-click overflow-hidden" onclick="showView('settings')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
    </header>

    <!-- TOP NAVIGATION -->
    <nav id="top-nav-bar" class="bg-white border-b border-gray-100 flex sticky top-[76px] z-[900] shadow-sm">
        <button id="tab-home" class="flex-1 py-4 text-[10px] uppercase font-black text-gray-400 nav-active safe-click" onclick="showView('home')">KIBLA</button>
        <button id="tab-zikr" class="flex-1 py-4 text-[10px] uppercase font-black text-gray-400 safe-click" onclick="showView('zikr')">ZIKR</button>
        <button id="tab-schedule" class="flex-1 py-4 text-[10px] uppercase font-black text-gray-400 safe-click" onclick="showView('schedule')">GEBETE</button>
        <button id="tab-settings" class="flex-1 py-4 text-[10px] uppercase font-black text-gray-400 safe-click" onclick="showView('settings')">PROFIL</button>
    </nav>

    <main class="max-w-xl mx-auto px-5 py-6">
        <!-- VIEW HOME -->
        <section id="view-home" class="view-section active space-y-6 text-center">
            <div id="main-home-wrap">
                <div class="bg-white p-6 rounded-[2rem] border border-gray-100 flex gap-4 shadow-sm text-left">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="#c5a059"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
                    <div>
                        <p id="txt-hadith-lbl" class="text-[9px] font-black text-gray-300 uppercase tracking-widest mb-1">Dnevni Hadis</p>
                        <p id="txt-hadith-val" class="text-gray-700 italic font-medium">"Najbolji među vama je onaj koji je besten zu seiner Familie ist."</p>
                    </div>
                </div>
                <div class="bg-black text-white p-10 rounded-[2.5rem] shadow-2xl text-center">
                    <h2 id="next-time-ui" class="text-5xl font-black italic mb-1">--:--</h2>
                    <p id="next-lbl-ui" class="text-[10px] text-gray-400 uppercase font-black tracking-widest mb-8">Lädt...</p>
                    <button class="bg-[#c5a059] text-black px-8 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest active:scale-95" onclick="toggleNames(true)">99 Namen Allahs</button>
                </div>
                <div class="relative w-full aspect-square bg-white border-2 border-gray-100 rounded-[3rem] shadow-xl flex flex-col items-center justify-center safe-click" onclick="initGPS()">
                    <div id="compass-ui" class="relative">
                        <div class="absolute -inset-14 border border-gray-50 rounded-full opacity-20 pointer-events-none"></div>
                        <svg width="110" height="110" viewBox="0 0 24 24" fill="#c5a059" stroke="#c5a059" stroke-width="1.5"><polygon points="12 2 16 12 12 22 8 12 12 2"></polygon></svg>
                    </div>
                    <div class="mt-8">
                        <span id="gps-btn-txt" class="font-black text-[10px] tracking-widest uppercase text-black block mb-1">Start GPS</span>
                        <span id="deg-val-ui" class="font-black text-2xl text-[#c5a059]">--°</span>
                    </div>
                </div>
                <div id="mosque-list-ui" class="space-y-4 pb-10"></div>
            </div>
            <div id="names-ui-wrap" class="hidden text-left">
                <button class="mb-6 font-black text-xs uppercase flex items-center gap-2" onclick="toggleNames(false)"> <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="4"><polyline points="15 18 9 12 15 6"></polyline></svg> <span id="txt-back-btn">Nazad</span></button>
                <div id="names-grid-ui" class="space-y-3"></div>
            </div>
        </section>

        <!-- VIEW ZIKR -->
        <section id="view-zikr" class="view-section text-center space-y-8">
            <div class="settings-card p-10">
                <div class="flex gap-2 mb-10">
                    <button id="zb-1" class="flex-1 py-3 rounded-xl bg-black text-[#c5a059] text-[9px] font-black" onclick="setZT('SubhanAllah', 'zb-1')">SubhanAllah</button>
                    <button id="zb-2" class="flex-1 py-3 rounded-xl bg-gray-50 text-gray-300 text-[9px] font-black" onclick="setZT('Elhamdulillah', 'zb-2')">Elhamdulillah</button>
                    <button id="zb-3" class="flex-1 py-3 rounded-xl bg-gray-50 text-gray-300 text-[9px] font-black" onclick="setZT('Allahu Akbar', 'zb-3')">Allahu Akbar</button>
                </div>
                <p id="z-type-display" class="text-gray-400 font-black text-xs uppercase mb-6 tracking-widest">SUBHANALLAH</p>
                <div id="zikr-counter-ui" class="counter-circle">0</div>
                <div class="flex gap-4 mt-12">
                    <button class="flex-[3] py-10 rounded-3xl bg-[#c5a059] text-black font-black text-4xl shadow-xl active:scale-95" onclick="addZ()">+1</button>
                    <button class="flex-1 rounded-2xl bg-black text-white text-[10px] font-black uppercase" onclick="resZ()">Reset</button>
                </div>
            </div>
        </section>

        <!-- VIEW GEBETE -->
        <section id="view-schedule" class="view-section">
            <div class="settings-card overflow-hidden">
                <div class="bg-black text-white p-8">
                    <h2 id="sched-date-ui" class="text-3xl font-black italic">--.--</h2>
                    <p class="text-[10px] text-gray-400 uppercase font-black mt-1">Namaz Vakti</p>
                </div>
                <div id="prayer-list-ui" class="divide-y divide-gray-50"></div>
            </div>
        </section>

        <!-- VIEW SETTINGS -->
        <section id="view-settings" class="view-section space-y-6">
            <div class="settings-card p-6 flex items-center gap-6">
                <div class="relative">
                    <div id="prof-pic-ui" class="w-16 h-16 rounded-full bg-black flex items-center justify-center overflow-hidden border-2 border-[#c5a059]">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </div>
                    <button id="p-cam-btn" class="absolute -bottom-1 -right-1 bg-black text-white p-2 rounded-full border-2 border-white hidden safe-click" onclick="document.getElementById('p-file-input').click()">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path><circle cx="12" cy="13" r="3"></circle></svg>
                    </button>
                    <input type="file" id="p-file-input" class="hidden" accept="image/*" onchange="uploadPic(this)">
                </div>
                <div>
                   <input id="p-name-inp" class="font-black text-2xl bg-transparent border-none p-0 focus:ring-0 text-black w-full" value="Kuzelj10" readonly>
                   <button class="text-[10px] font-black uppercase text-gray-400 mt-1" onclick="toggleEdit()">Uredi Profil</button>
                </div>
            </div>
            <div class="space-y-4">
                <div class="settings-card p-6">
                    <p class="text-[10px] font-black text-gray-300 uppercase tracking-widest mb-4">Jezik / Sprache</p>
                    <div class="grid grid-cols-3 gap-2">
                        <button id="lb-de" class="py-3 rounded-xl bg-gray-50 text-[10px] font-black" onclick="setL('de')">DE</button>
                        <button id="lb-en" class="py-3 rounded-xl bg-gray-50 text-[10px] font-black" onclick="setL('en')">EN</button>
                        <button id="lb-bs" class="py-3 rounded-xl bg-black text-[#c5a059] text-[10px] font-black" onclick="setL('bs')">BS</button>
                    </div>
                </div>
                <div class="settings-card p-6">
                    <p class="text-[10px] font-black text-gray-300 uppercase tracking-widest mb-4">Metoda / Kalkulator</p>
                    <select id="calc-method" class="w-full p-4 bg-gray-50 rounded-xl text-xs font-black outline-none appearance-none" onchange="setCM(this.value)">
                        <option value="13">IZ BiH (Sarajevo)</option>
                        <option value="3">Muslim World League</option>
                        <option value="2">ISNA (North America)</option>
                        <option value="4">Umm Al-Qura (Makkah)</option>
                    </select>
                </div>
                <div class="settings-card p-6">
                    <p class="text-[10px] font-black text-gray-300 uppercase tracking-widest mb-4">Mezheb</p>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="mb-1" class="py-4 rounded-xl bg-black text-[#c5a059] text-[10px] font-black" onclick="setMZ('h')">HANAFI</button>
                        <button id="mb-2" class="py-4 rounded-xl bg-gray-50 text-[10px] font-black" onclick="setMZ('s')">SHAFI+</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm z-[2000]">
        <nav class="bg-black text-white rounded-full flex justify-around p-3 shadow-2xl border-2 border-white/5">
            <button id="btn-n-h" class="p-3 rounded-full bottom-nav-active safe-click" onclick="showView('home')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></button>
            <button id="btn-n-z" class="p-3 rounded-full opacity-40 safe-click" onclick="showView('zikr')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><path d="M12 12m-3 0a3 3 0 1 0 6 0"></path></svg></button>
            <button id="btn-n-s" class="p-3 rounded-full opacity-40 safe-click" onclick="showView('schedule')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg></button>
            <button id="btn-n-p" class="p-3 rounded-full opacity-40 safe-click" onclick="showView('settings')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="7" r="4"></circle></svg></button>
        </nav>
    </div>

    <script>
        const NAMES = [
            {a:"الرَّحْمَنُ",t:"Ar-Rahman",m:"All-Beneficent"},{a:"الرَّحِيمُ",t:"Ar-Rahim",m:"All-Merciful"},{a:"الْمَلِكُ",t:"Al-Malik",m:"Absolute Ruler"},{a:"الْقُدُّوسُ",t:"Al-Quddus",m:"Pure One"},
            {a:"السَّلامُ",t:"As-Salam",m:"Source of Peace"},{a:"الْمُؤْمِنُ",t:"Al-Mu'min",m:"Inspirer of Faith"},{a:"الْمُهَيْمِنُ",t:"Al-Muhaymin",m:"Guardian"},{a:"الْعَزِيزُ",t:"Al-Aziz",m:"Victorious"},
            {a:"الْجَبَّارُ",t:"Al-Jabbar",m:"Compeller"},{a:"الْمُتَكَبِّرُ",t:"Al-Mutakabbir",m:"Greatest"},{a:"الْخَالِقُ",t:"Al-Khaliq",m:"Creator"},{a:"الْبَارِئُ",t:"Al-Bari'",m:"Maker of Order"},
            {a:"الْمُصَوِّرُ",t:"Al-Musawwir",m:"Shaper of Beauty"},{a:"الْغَفَّارُ",t:"Al-Ghaffar",m:"Forgiving"},{a:"الْقَهَّارُ",t:"Al-Qahhar",m:"Subduer"},{a:"الْوَهَّابُ",t:"Al-Wahhab",m:"Giver of All"},
            {a:"الرَّزَّاقُ",t:"Ar-Razzaq",m:"Sustainer"},{a:"الْفَتَّاحُ",t:"Al-Fattah",m:"Opener"},{a:"الْعَلِيمُ",t:"Al-Alim",m:"Knower of All"},{a:"الْقَابِضُ",t:"Al-Qabid",m:"Constrictor"},
            {a:"الْبَاسِطُ",t:"Al-Basit",m:"Reliever"},{a:"الْخَافِضُ",t:"Al-Khafid",m:"Abaser"},{a:"الرَّافِعُ",t:"Ar-Rafi'",m:"Exalter"},{a:"الْمُعِزُّ",t:"Al-Mu'izz",m:"Bestower of Honors"},
            {a:"الْمُذِلُّ",t:"Al-Mudhill",m:"Humiliator"},{a:"السَّمِيعُ",t:"As-Sami'",m:"All-Hearing"},{a:"الْبَصِيرُ",t:"Al-Basir",m:"All-Seeing"},{a:"الْحَكَمُ",t:"Al-Hakam",m:"Judge"},
            {a:"الْعَدْلُ",t:"Al-Adl",m:"Just"},{a:"اللَّطِيفُ",t:"Al-Latif",m:"Subtle One"},{a:"الْخَبِيرُ",t:"Al-Khabir",m:"All-Aware"},{a:"الْحَلِيمُ",t:"Al-Halim",m:"Forbearing"},
            {a:"الْعَظِيمُ",t:"Al-Azim",m:"Magnificent"},{a:"الْغَفُورُ",t:"Al-Ghafur",m:"Forgiver"},{a:"الشَّكُورُ",t:"Ash-Shakur",m:"Rewarder of Thankfulness"},{a:"الْعَلِيُّ",t:"Al-Ali",m:"Highest"},
            {a:"الْكَبِيرُ",t:"Al-Kabir",m:"Greatest"},{a:"الْحَفِيظُ",t:"Al-Hafiz",m:"Preserver"},{a:"الْمُقِيتُ",t:"Al-Muqit",m:"Nourisher"},{a:"الْحَسِيبُ",t:"Al-Hasib",m:"Accounter"},
            {a:"الْجَلِيلُ",t:"Al-Jalil",m:"Mighty"},{a:"الْكَرِيمُ",t:"Al-Karim",m:"Generous"},{a:"الرَّقِيبُ",t:"Ar-Raqib",m:"Watchful"},{a:"الْمُجِيبُ",t:"Al-Mujib",m:"Responder"},
            {a:"الْوَاسِعُ",t:"Al-Wasi'",m:"All-Comprehending"},{a:"الْحَكِيمُ",t:"Al-Hakim",m:"Perfectly Wise"},{a:"الْوَدُودُ",t:"Al-Wadud",m:"Loving"},{a:"الْمَجِيدُ",t:"Al-Majid",m:"Majestic"},
            {a:"الْبَاعِثُ",t:"Al-Ba'ith",m:"Resurrector"},{a:"الشَّهِيدُ",t:"Ash-Shahid",m:"Witness"},{a:"الْحَقُّ",t:"Al-Haqq",m:"Truth"},{a:"الْوَكِيلُ",t:"Al-Wakil",m:"Trustee"},
            {a:"الْقَوِيُّ",t:"Al-Qawi",m:"All Strength"},{a:"الْمَتِينُ",t:"Al-Matin",m:"Forceful One"},{a:"الْوَلِيُّ",t:"Al-Wali",m:"Governor"},{a:"الْحَمِيدُ",t:"Al-Hamid",m:"Praised One"},
            {a:"الْمُحْصِي",t:"Al-Muhsi",m:"Appraiser"},{a:"الْمُبْدِئُ",t:"Al-Mubdi'",m:"Originator"},{a:"الْمُعِيدُ",t:"Al-Mu'id",m:"Restorer"},{a:"الْمُحْيِي",t:"Al-Muhyi",m:"Giver of Life"},
            {a:"الْمُمِيتُ",t:"Al-Mumit",m:"Taker of Life"},{a:"الْحَيُّ",t:"Al-Hayy",m:"Ever Living"},{a:"الْقَيُّومُ",t:"Al-Qayyum",m:"Self-Existing"},{a:"الْوَاجِدُ",t:"Al-Wajid",m:"Finder"},
            {a:"الْمَاجِدُ",t:"Al-Majid",m:"Glorious"},{a:"الْوَاحِدُ",t:"Al-Wahid",m:"Only One"},{a:"الأَحَدُ",t:"Al-Ahad",m:"One"},{a:"الصَّمَدُ",t:"As-Samad",m:"Satisfier"},
            {a:"الْقَادِرُ",t:"Al-Qadir",m:"All Powerful"},{a:"الْمُقْتَدِرُ",t:"Al-Muqtadir",m:"Creator"},{a:"الْمُقَدِّمُ",t:"Al-Muqaddim",m:"Expediter"},{a:"الْمُؤَخِّرُ",t:"Al-Mu'akhkhir",m:"Delayer"},
            {a:"الأَحَدُ",t:"Al-Ahad",m:"Single One"},{a:"الصَّمَدُ",t:"As-Samad",m:"Eternal One"}
        ];

        let lang = localStorage.getItem('L') || 'bs';
        let zk = parseInt(localStorage.getItem('Z')) || 0;
        let myPos = null;
        let qiblaDeg = 0;

        function safeSet(id, val) { 
            const el = document.getElementById(id); 
            if(el) { if(val !== undefined) el.innerText = val; return el; } 
            return { style: {}, innerText: "", innerHTML: "", classList: { add:()=>{}, remove:()=>{}, toggle:()=>{} } };
        }

        function refresh() {
            const m = {
                de: { h:"KIBLA", z:"ZIKR", p:"GEBETE", pr:"PROFIL", next:"Nächstes Gebet", back:"Zurück" },
                en: { h:"QIBLA", z:"ZIKR", p:"PRAYERS", pr:"PROFILE", next:"Next Prayer", back:"Back" },
                bs: { h:"KIBLA", z:"ZIKR", p:"NAMAZ", pr:"PROFIL", next:"Sljedeći Namaz", back:"Nazad" }
            }[lang] || {};
            safeSet('tab-home', m.h); safeSet('tab-zikr', m.z); safeSet('tab-schedule', m.p); safeSet('tab-settings', m.pr);
            safeSet('txt-back-btn', m.back); safeSet('next-lbl-ui', m.next);
            
            ['de','en','bs'].forEach(l => {
                const b = document.getElementById('lb-'+l);
                if(b) b.className = l===lang ? "py-3 rounded-xl bg-black text-[#c5a059] text-[10px] font-black" : "py-3 rounded-xl bg-gray-50 text-gray-300 text-[10px] font-black";
            });
            const mz = localStorage.getItem('MZ') || 'h';
            const b1 = document.getElementById('mb-1'); if(b1) b1.className = mz==='h' ? "py-4 rounded-xl bg-black text-[#c5a059] text-[10px] font-black" : "py-4 rounded-xl bg-gray-50 text-gray-300 text-[10px] font-black";
            const b2 = document.getElementById('mb-2'); if(b2) b2.className = mz==='s' ? "py-4 rounded-xl bg-black text-[#c5a059] text-[10px] font-black" : "py-4 rounded-xl bg-gray-50 text-gray-300 text-[10px] font-black";
            const sel = document.getElementById('calc-method'); if(sel) sel.value = localStorage.getItem('CM') || '13';
        }

        async function initGPS() {
            safeSet('gps-btn-txt', "TRAŽIM...");
            navigator.geolocation.getCurrentPosition(async (p) => {
                myPos = p.coords;
                qiblaDeg = calculateQibla(myPos.latitude, myPos.longitude);
                safeSet('deg-val-ui', Math.round(qiblaDeg) + "°");
                const cp = document.getElementById('compass-ui'); if(cp) cp.style.transform = `rotate(${qiblaDeg}deg)`;
                if(window.DeviceOrientationEvent) {
                    if(typeof DeviceOrientationEvent.requestPermission==='function') {
                        DeviceOrientationEvent.requestPermission().then(r => { if(r==='granted') window.addEventListener('deviceorientation', hOrient); });
                    } else { window.addEventListener('deviceorientation', hOrient); }
                }
                load(myPos.latitude, myPos.longitude);
                safeSet('gps-btn-txt', "GPS AKTIV");
            }, () => { alert("GPS Fehler!"); });
        }

        async function load(lat, lon) {
            const cm = localStorage.getItem('CM') || '13';
            const s = localStorage.getItem('MZ')==='s'?1:0;
            const r = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=${cm}&school=${s}`);
            const data = await r.json();
            const list = ['Fajr', 'Sunrise', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
            const container = document.getElementById('prayer-list-ui');
            if(container) container.innerHTML = list.map(n => `<div class="p-6 flex justify-between items-center bg-white"><span class="font-black text-[9px] text-gray-300 uppercase">${n}</span><span class="font-black text-2xl text-black">${data.data.timings[n]}</span></div>`).join('');
            safeSet('sched-date-ui', data.data.date.readable);
            safeSet('next-time-ui', data.data.timings['Dhuhr']);

            const mreq = await fetch(`https://overpass-api.de/api/interpreter?data=[out:json];node["amenity"="place_of_worship"]["religion"="muslim"](around:10000,${lat},${lon});out;`);
            const mres = await mreq.json();
            const ml = document.getElementById('mosque-list-ui');
            if(ml) ml.innerHTML = mres.elements.slice(0,5).map(i => `
                <div class="settings-card p-5 flex justify-between items-center active:scale-95 transition" onclick="navTo(${i.lat},${i.lon})">
                    <span class="font-black text-xs uppercase text-black">${i.tags.name||'Džamija'}</span>
                    <div class="bg-black text-[#c5a059] p-2 rounded-full"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="15 10 20 15 15 20"></polyline><path d="M4 4v7a4 4 0 0 0 4 4h12"></path></svg></div>
                </div>`).join('');
        }

        function calculateQibla(lat, lon) {
            const kl=21.4225*Math.PI/180; const ko=39.8262*Math.PI/180;
            const ml=lat*Math.PI/180; const mo=lon*Math.PI/180;
            const y=Math.sin(ko-mo);
            const x=Math.cos(ml)*Math.tan(kl)-Math.sin(ml)*Math.cos(ko-mo);
            return (Math.atan2(y, x)*180/Math.PI+360)%360;
        }

        function hOrient(e) {
            let h = e.webkitCompassHeading || (360 - e.alpha);
            const cp = document.getElementById('compass-ui'); 
            if(h && cp) cp.style.transform = `rotate(${qiblaDeg - h}deg)`;
        }

        function addZ() { zk++; safeSet('zikr-counter-ui', zk); localStorage.setItem('Z', zk); if(navigator.vibrate) navigator.vibrate(50); }
        function resZ() { zk=0; safeSet('zikr-counter-ui', 0); localStorage.setItem('Z', 0); }
        function setZT(t, i) { 
            safeSet('z-type-display', t.toUpperCase());
            ['1','2','3'].forEach(n => { const b = document.getElementById('zb-'+n); if(b) b.className = "flex-1 py-3 rounded-xl bg-gray-50 text-gray-300 text-[9px] font-black"; });
            const sel = document.getElementById(i); if(sel) sel.className = "flex-1 py-3 rounded-xl bg-black text-[#c5a059] text-[9px] font-black";
        }
        function setL(l) { lang = l; localStorage.setItem('L', l); refresh(); }
        function setCM(v) { localStorage.setItem('CM', v); if(myPos) load(myPos.latitude, myPos.longitude); }
        function setMZ(v) { localStorage.setItem('MZ', v); refresh(); if(myPos) load(myPos.latitude, myPos.longitude); }
        function showView(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            const v = document.getElementById('view-'+id); if(v) v.classList.add('active');
            ['h','z','s','p'].forEach(n => { const b = document.getElementById('btn-n-'+n); if(b) { b.classList.add('opacity-40'); b.classList.remove('bottom-nav-active'); } });
            const map = {home:'h',zikr:'z',schedule:'s',settings:'p'};
            const active = document.getElementById('btn-n-'+map[id]); if(active) { active.classList.remove('opacity-40'); active.classList.add('bottom-nav-active'); }
            document.querySelectorAll('#top-nav-bar button').forEach(b => b.classList.remove('nav-active'));
            const th = document.getElementById('tab-'+id); if(th) th.classList.add('nav-active');
        }
        function toggleNames(s) {
            const mu = document.getElementById('main-home-wrap'); if(mu) mu.style.display = s?'none':'block';
            const nu = document.getElementById('names-ui-wrap'); if(nu) nu.style.display = s?'block':'none';
            if(s) {
                const ng = document.getElementById('names-grid-ui');
                if(ng) ng.innerHTML = NAMES.map((n, i) => `
                    <div class="bg-white p-6 rounded-2xl border border-gray-100 flex items-center justify-between shadow-sm">
                        <div class="flex items-center gap-4">
                            <span class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center font-black text-[9px] text-gray-300">#${i+1}</span>
                            <div><p class="font-black text-black text-xs uppercase">${n.t}</p><p class="text-[9px] text-gray-400 font-bold uppercase">${n.m}</p></div>
                        </div>
                        <span class="text-2xl font-arabic text-[#c5a059]">${n.a}</span>
                    </div>`).join('');
            }
        }
        function navTo(la, lo) { window.open(`https://www.google.com/maps/dir/?api=1&destination=${la},${lo}`, '_blank'); }
        
        function toggleEdit() {
            const n = document.getElementById('p-name-inp'); if(!n) return;
            const cam = document.getElementById('p-cam-btn');
            n.readOnly = false; n.focus(); 
            if(cam) cam.classList.remove('hidden');
            n.addEventListener('blur', () => { 
                n.readOnly = true; 
                localStorage.setItem('p_name', n.value); 
                if(cam) cam.classList.add('hidden');
            });
        }

        function uploadPic(inp) {
            if (inp.files && inp.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const data = e.target.result;
                    const html = `<img src="${data}" class="img-slot">`;
                    const slot1 = document.getElementById('prof-pic-ui'); if(slot1) slot1.innerHTML = html;
                    const slot2 = document.getElementById('head-profile-img'); if(slot2) slot2.innerHTML = html;
                    localStorage.setItem('p_img', data);
                };
                reader.readAsDataURL(inp.files[0]);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            safeSet('zikr-counter-ui', zk);
            const savedName = localStorage.getItem('p_name');
            const ninp = document.getElementById('p-name-inp'); if(savedName && ninp) ninp.value = savedName;
            const savedImg = localStorage.getItem('p_img');
            if(savedImg) {
                const html = `<img src="${savedImg}" class="img-slot">`;
                const slot1 = document.getElementById('prof-pic-ui'); if(slot1) slot1.innerHTML = html;
                const slot2 = document.getElementById('head-profile-img'); if(slot2) slot2.innerHTML = html;
            }
            refresh();
        });
    </script>
</body>
</html>
