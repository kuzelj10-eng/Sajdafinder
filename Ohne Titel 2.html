<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">

    <title>SajdaFinder V2 - Final Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --black: #000000; --white: #fff; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: var(--black); -webkit-tap-highlight-color: transparent; }
        .font-arabic { font-family: 'Amiri', serif; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .nav-active { border-bottom: 4px solid var(--black); color: var(--black) !important; font-weight: 900; }
        .bottom-nav-active { background-color: var(--gold) !important; color: var(--black) !important; transform: scale(1.1); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .safe-click { cursor: pointer !important; z-index: 50; position: relative; }
        .counter-circle { width: 240px; height: 240px; border-radius: 50%; border: 12px solid var(--black); display: flex; align-items: center; justify-content: center; font-size: 5rem; font-weight: 900; margin: 0 auto; background: #fff; }
        svg { display: inline-block; vertical-align: middle; }
    </style>
</head>
<body class="pb-32">

    <!-- HEADER -->

        <div id="head-profile-pic" class="w-10 h-10 rounded-full border-2 border-[#c5a059] flex items-center justify-center overflow-hidden bg-gray-800 safe-click" onclick="showView('settings')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
    </header>

        <button id="tab-zikr" class="flex-1 py-4 text-[10px] uppercase font-bold tracking-widest text-gray-400 safe-click" onclick="showView('zikr')">Zikr</button>
        <button id="tab-schedule" class="flex-1 py-4 text-[10px] uppercase font-bold tracking-widest text-gray-400 safe-click" onclick="showView('schedule')">Namaz</button>
        <button id="tab-settings" class="flex-1 py-4 text-[10px] uppercase font-bold tracking-widest text-gray-400 safe-click" onclick="showView('settings')">Profil</button>
    </nav>

    <main class="max-w-xl mx-auto px-6 py-8">

        <!-- VIEW: HOME (QIBLA & MOSQUES) -->

                    <div>
                        <h4 class="text-black font-black text-[10px] uppercase tracking-widest">Daily Hadith</h4>
                        <p class="text-gray-500 italic text-sm">"Der Beste unter euch ist derjenige, der am besten zu seiner Familie ist."</p>
                    </div>
                </div>

                <div class="bg-black text-white p-8 rounded-3xl mb-8 shadow-2xl relative overflow-hidden">
                    <h2 id="next-prayer-time" class="text-3xl font-black mb-1">Dhuhr</h2>
                    <p class="text-gray-400 mb-6 font-bold">Nächstes Gebetszeit</p>
                    <button class="bg-[#c5a059] text-black px-8 py-3 rounded-xl font-black text-xs uppercase tracking-widest safe-click" onclick="showAllahNames(true)">99 NAMEN ALLAHS</button>
                </div>

                <button class="w-full h-52 bg-white border border-gray-100 rounded-3xl flex flex-col items-center justify-center gap-4 safe-click shadow-sm" onclick="initTracking()">
                    <div id="compass-needle" class="transition-transform duration-1000">
                        <svg width="60" height="60" viewBox="0 0 24 24" fill="#c5a059" stroke="#c5a059" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>
                    </div>
                    <span id="loc-status" class="font-black text-xs tracking-widest uppercase">MAP & KIBLA AKTIVIEREN</span>
                </button>

                <div id="location-error" class="hidden text-center text-red-500 font-bold p-4"></div>
                <div id="mosque-list" class="mt-8 space-y-4"></div>
            </div>

            <!-- Allah Names Overlay -->
            <div id="names-view" class="hidden">
                    <button class="mb-4 font-bold text-sm flex items-center gap-2 safe-click" onclick="showAllahNames(false)"> <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg> Zurück</button>
                    <div id="names-grid" class="grid gap-3"></div>
            </div>
        </section>

        <!-- VIEW: ZIKR -->
        <section id="view-zikr" class="view-section text-center space-y-10">
            <div class="bg-white rounded-3xl border border-gray-100 p-10 shadow-lg">
                <p class="text-gray-400 font-black text-[10px] uppercase mb-4 tracking-widest">Tesbih Counter</p>
                <div id="zikr-ct" class="counter-circle">0</div>
                <div class="flex gap-4 mt-10">
                    <button class="flex-1 py-10 rounded-3xl font-black text-2xl safe-click" style="background-color: var(--gold)" onclick="doZikr()">BROJI (+)</button>
                    <button class="bg-black text-white px-8 rounded-2xl font-bold uppercase text-[10px] safe-click" onclick="resZikr()">RESET</button>
                </div>
            </div>
        </section>

        <!-- VIEW: SCHEDULE -->
        <section id="view-schedule" class="view-section">
            <div class="bg-white rounded-3xl border border-gray-100 overflow-hidden shadow-xl">

                    <div>

                        <h2 id="sched-date" class="text-2xl font-black italic">2024</h2>
                    </div>
                    <span id="sched-loc" class="bg-[#c5a059] text-black px-3 py-1 rounded-lg text-[10px] font-black uppercase">SUCHE...</span>
                </div>
                <div id="sched-list" class="divide-y divide-gray-50"></div>
            </div>
        </section>

        <!-- VIEW: SETTINGS -->

                    </div>
                    <div class="flex-1 space-y-1">

                        <input id="userEmail" class="w-full text-xs text-gray-400 bg-transparent border-none p-0 focus:ring-0" value="kuzelj10@gmail.com" readonly>
                    </div>
                </div>
            </div>

            <div class="bg-white border border-gray-100 rounded-3xl divide-y divide-gray-50 shadow-sm overflow-hidden font-bold">

                        <button id="l-en" class="py-2 rounded-xl text-[10px] bg-gray-50 text-gray-300" onclick="setLang('en')">EN</button>
                        <button id="l-bs" class="py-2 rounded-xl text-[10px] bg-gray-50 text-gray-300" onclick="setLang('bs')">BS</button>
                    </div>
                </div>

                    <select id="calcMethod" class="w-full bg-gray-50 border border-gray-100 rounded-xl p-4 text-xs font-black outline-none safe-click">

                        <option value="3">Muslim World League</option>
                        <option value="2">ISNA (North America)</option>
                    </select>
                </div>
                <div class="p-6 space-y-4">
                    <p class="text-[10px] uppercase text-gray-400 tracking-widest">Rechtsschule (Mezheb)</p>
                    <div class="grid grid-cols-2 gap-2 text-[10px]">
                        <button id="m-hanafi" class="py-3 rounded-xl bg-black text-[#c5a059]" onclick="setMezheb('hanafi')">HANAFI</button>
                        <button id="m-shafi" class="py-3 rounded-xl bg-gray-50 text-gray-300" onclick="setMezheb('shafi')">SHAFI</button>
                    </div>
                </div>
            </div>
        </section>

    </main>

        </nav>

            { a: "ٱلْمُغْنِي", t: "Al-Mughnī", m: "Der Reichmachende" }, { a: "ٱلْمَانِعُ", t: "Al-Māni'", m: "Der Verwehrende" }, { a: "ٱلضَّارُّ", t: "Ad-Dārr", m: "Der Schadenbringende" },
            { a: "ٱلنَّافِعُ", t: "An-Nāfi'", m: "Der Nutzenbringende" }, { a: "ٱلنُّورُ", t: "An-Nūr", m: "Das Licht" }, { a: "ٱلْهَادِي", t: "Al-Hādī", m: "Der Leitende" },
            { a: "ٱلْبَدِيعُ", t: "Al-Badī'", m: "Der Schöpfer" }, { a: "ٱلْبَاقِي", t: "Al-Bāqī", m: "Der Bleibende" }, { a: "ٱلْوَارِثُ", t: "Al-Wārith", m: "Der Erbe" },
            { a: "ٱلرَّشِيدُ", t: "Ar-Rashīd", m: "Der Rechtleitende" }, { a: "ٱلصَّبُورُ", t: "As-Sabūr", m: "Der Geduldige" }
        ];

        // NAVIGATION
        function showView(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('tab-' + id).classList.add('nav-active');
            document.querySelectorAll('.fixed button').forEach(btn => { 
                btn.classList.add('opacity-40'); 
                btn.classList.remove('bottom-nav-active'); 
            });
            document.getElementById('btn-' + id).classList.remove('opacity-40');
            document.getElementById('btn-' + id).classList.add('bottom-nav-active');
        }

        // ZIKR
        document.getElementById('zikr-ct').innerText = count;
        function doZikr() {
            count++;
            document.getElementById('zikr-ct').innerText = count;
            localStorage.setItem('zk_count', count);
            if(navigator.vibrate) navigator.vibrate(50);
        }
        function resZikr() {
            count = 0;
            document.getElementById('zikr-ct').innerText = 0;
            localStorage.setItem('zk_count', 0);
        }

        // NAMES
        function showAllahNames(show) {
            document.getElementById('main-home').classList.toggle('hidden', show);
            document.getElementById('names-view').classList.toggle('hidden', !show);
            if(show) {
                document.getElementById('names-grid').innerHTML = allNames.map((n, i) => `
                    <div class="bg-white p-6 rounded-2xl border border-gray-100 flex justify-between items-center shadow-sm">
                        <div class="flex items-center gap-4 text-left">
                            <span class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center font-black text-[10px] text-gray-300 border border-gray-50">${i+1}</span>
                            <div><h4 class="font-black text-sm">${n.t}</h4><p class="text-[10px] text-gray-400 italic">${n.m}</p></div>
                        </div>
                        <span class="text-2xl font-arabic text-[#c5a059]">${n.a}</span>
                    </div>
                `).join('');
            }
        }

        // TRACKING & API
        async function initTracking() {
            const btnT = document.getElementById('loc-status');
            const needle = document.getElementById('compass-needle');
            const errBox = document.getElementById('location-error');
            
            errBox.classList.add('hidden');
            btnT.innerText = "SUCHE STANDORT...";
            
            if (!navigator.geolocation) {
                errBox.innerText = "Geolocation nicht unterstützt.";
                errBox.classList.remove('hidden');
                return;
            }

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                const method = document.getElementById('calcMethod').value;
                needle.style.transform = `rotate(122deg)`; // Kibla Mockup
                btnT.innerText = "LADE DATEN...";
                
                try {
                    // NAMAZ TIMES
                    const resp = await fetch(`https://api.aladhan.com/v1/timings?latitude=${latitude}&longitude=${longitude}&method=${method}`);
                    const data = await resp.json();
                    renderPrTimes(data.data.timings);
                    
                    // MOSQUES
                    fetchMosques(latitude, longitude);
                    
                    btnT.innerText = "KOMPASS AKTIV";
                    document.getElementById('sched-loc').innerText = "VIB - AKTIV";
                } catch(e) {
                    btnT.innerText = "FEHLER BEIM LADEN";
                }
            }, (err) => {
                btnT.innerText = "ZUGRIFF VERWEIGERT";
            });
        }

        async function fetchMosques(lat, lon) {
            // Radius auf 10km erhöht für bessere Resultate
            const query = `[out:json];node["amenity"="place_of_worship"]["religion"="muslim"](around:10000,${lat},${lon});out;`;
            const resp = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
            const dat = await resp.json();
            const res = document.getElementById('mosque-list');
            
            if(!dat.elements || dat.elements.length === 0) {
               res.innerHTML = `<div class="p-8 border border-dashed border-gray-100 rounded-3xl text-center text-gray-300 font-bold text-xs uppercase tracking-widest">Keine Moscheen im Umkreis von 10km gefunden.</div>`;
               return;
            }

            res.innerHTML = `<h5 class="text-[10px] uppercase text-gray-400 font-black px-2 mt-4 tracking-widest mb-2">Džamije u blizini (bis 10km)</h5>` + 
                dat.elements.slice(0, 10).map(m => `
                    <div class="bg-white p-5 rounded-2xl border border-gray-50 flex justify-between items-center shadow-sm">
                        <div class="flex items-center gap-3">
                            <div class="w-2 h-2 rounded-full bg-[#c5a059] shadow-[0_0_8px_#c5a059]"></div>
                            <span class="font-bold text-sm text-black">${m.tags.name || 'Džamija'}</span>
                        </div>
                        <span class="bg-black text-[#c5a059] px-3 py-1 rounded-full text-[9px] font-black uppercase">RECHTZEITIG</span>
                    </div>
                `).join('');
        }

        function renderPrTimes(t) {
            const list = document.getElementById('sched-list');
            const order = ['Fajr', 'Sunrise', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
            list.innerHTML = order.map(n => `
                <div class="p-6 flex justify-between items-center bg-white">
                    <span class="font-bold text-[10px] uppercase text-gray-300 tracking-widest">${n}</span>
                    <span class="font-black text-xl text-black tracking-tighter">${t[n]}</span>
                </div>
            `).join('');
            document.getElementById('next-prayer-time').innerText = t['Dhuhr'] + " Uhr";
            document.getElementById('sched-date').innerText = new Date().toLocaleDateString('de-DE', { day: '2-digit', month: 'long', year: 'numeric'});
        }

        // PROFILE & SETTINGS
        function toggleEditing() {
            isEditing = !isEditing;
            const btn = document.getElementById('ed-btn');
            btn.innerText = isEditing ? "Speichern" : "Bearbeiten";
            document.getElementById('cam-icon').classList.toggle('hidden', !isEditing);
            const name = document.getElementById('userName');
            const mail = document.getElementById('userEmail');
            [name, mail].forEach(i => {
                i.readOnly = !isEditing;
                i.classList.toggle('bg-gray-50', isEditing);
                i.classList.toggle('p-2', isEditing);
                i.classList.toggle('rounded-lg', isEditing);
            });
            if(isEditing) name.focus();
        }

        function uploadDone(inp) {
            if (inp.files && inp.files[0]) {
                const r = new FileReader();
                r.onload = (e) => {
                    const img = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
                    document.getElementById('prof-pic-box').innerHTML = img;
                    document.getElementById('head-profile-pic').innerHTML = img;
                };
                r.readAsDataURL(inp.files[0]);
            }
        }
    </script>
</body>
</html>
