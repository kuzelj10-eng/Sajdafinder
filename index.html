<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SajdaFinder V3 - Final Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="icon.PNG">
<link rel="apple-touch-icon" href="icon.PNG">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SajdaFinder">
  <link rel="apple-touch-startup-image" href="icon.PNG">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --black: #111111; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: var(--black); -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .font-arabic { font-family: 'Amiri', serif; }
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-active { border-bottom: 5px solid var(--black); color: var(--black) !important; font-weight: 900; }
        .bottom-nav-active { background-color: var(--gold) !important; color: var(--black) !important; transform: scale(1.1); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .safe-click { cursor: pointer; touch-action: manipulation; }
        
        #compass-outer { border: 8px solid #f1f1f1; transition: border-color 0.3s ease; box-shadow: 0 0 0 rgba(197, 160, 89, 0); }
        #compass-outer.aligned { border-color: var(--gold); box-shadow: 0 0 35px rgba(197, 160, 89, 0.6); }
        #needle-group { transition: transform 0.1s linear; transform-origin: center; display: none; }
        .compass-btn { background: var(--black); color: var(--gold); border-radius: 99px; padding: 12px 24px; font-weight: 900; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.2s; border: 2px solid var(--gold); }
        .compass-btn:active { transform: scale(0.95); }
        .zikr-ring { transition: stroke-dashoffset 0.3s ease; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .mosque-card { background: white; border-radius: 1.5rem; border: 1px solid #f1f1f1; }
    </style>
</head>
<body class="pb-32 text-left">

    <!-- HEADER -->
    <header class="bg-black text-white px-6 py-6 flex justify-between items-center sticky top-0 z-[1000] shadow-xl">
        <div class="flex items-center gap-3">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            <span class="text-2xl font-black tracking-tighter uppercase leading-none">SajdaFinder <span class="text-[#c5a059]">V2</span></span>
        </div>
        <div id="head-img" class="w-10 h-10 rounded-full border-2 border-[#c5a059] flex items-center justify-center bg-gray-800 overflow-hidden safe-click" onclick="showView('settings')">
            <svg id="head-placeholder" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
    </header>

    <!-- TABS -->
    <nav class="bg-white border-b border-gray-100 flex sticky top-[76px] z-[900] shadow-sm">
        <button id="tab-home" class="flex-1 py-4 text-[10px] uppercase font-black text-gray-400 nav-active" onclick="showView('home')">KIBLA</button>
        <button id="tab-zikr" class="flex-1 py-4 text-[10px] uppercase font-black text-gray-400" onclick="showView('zikr')">ZIKR</button>
        <button id="tab-schedule" class="flex-1 py-4 text-[10px] uppercase font-black text-gray-400" onclick="showView('schedule')">GEBETE</button>
        <button id="tab-settings" class="flex-1 py-4 text-[10px] uppercase font-black text-gray-400" onclick="showView('settings')">PROFIL</button>
    </nav>

    <main class="max-w-xl mx-auto px-5 py-6">
        <!-- VIEW: HOME -->
        <section id="view-home" class="view-section active space-y-8">
            <div id="home-ui">
                <div class="bg-white p-5 rounded-3xl border border-gray-100 flex gap-4 shadow-sm">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="#c5a059"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
                    <p id="txt-hadith" class="text-gray-700 italic font-medium text-xs leading-relaxed">"Najbolji među vama je onaj koji je najbolji prema svojoj porodici."</p>
                </div>

                <div class="bg-black text-white p-8 rounded-[2.5rem] shadow-2xl text-center">
                    <h2 id="home-time" class="text-5xl font-black italic mb-1">--:--</h2>
                    <p id="home-next-lbl" class="text-[10px] text-gray-500 uppercase font-black tracking-widest mb-6">Sljedeći Namaz</p>
                    <button class="bg-[#c5a059] text-black px-8 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest active:scale-95" onclick="toggleAllah(true)">99 Namen Allahs</button>
                </div>

                <!-- COMPASS -->
                <div class="flex flex-col items-center justify-center p-4">
                    <div id="compass-outer" class="relative w-64 h-64 md:w-80 md:h-80 rounded-full bg-white flex items-center justify-center shadow-inner">
                        <div class="absolute inset-5 flex flex-col justify-between items-center text-[10px] font-black text-gray-200 pointer-events-none">
                            <span>N</span>
                            <div class="flex w-full justify-between px-3"><span>W</span><span>O</span></div>
                            <span>S</span>
                        </div>
                        
                        <!-- PERMISSION BUTTON -->
                        <button id="btn-activate-comp" class="compass-btn z-50 shadow-xl" onclick="initSensors()">Kompass Aktivieren</button>

                        <div id="needle-group" class="relative w-full h-full p-10 flex items-center justify-center">
                             <svg width="100%" height="100%" viewBox="0 0 100 100">
                                 <polygon points="50,10 58,50 42,50" fill="#FF3B30" />
                                 <polygon points="50,90 58,50 42,50" fill="#1C1C1E" />
                                 <circle cx="50" cy="50" r="4" fill="#c5a059" stroke="white" stroke-width="1.5" />
                             </svg>
                        </div>
                    </div>
                    <div class="mt-8 text-center space-y-2">
                        <p id="comp-status" class="text-[10px] font-black uppercase text-gray-300 tracking-[0.3em]">Permission required for Qibla</p>
                        <h3 id="comp-deg" class="text-3xl font-black text-black">--°</h3>
                    </div>
                </div>

                <div id="mosque-list" class="space-y-4 pb-20"></div>
            </div>

            <!-- Allah Names UI -->
            <div id="allah-ui" class="hidden">
                <button class="mb-6 font-black text-xs uppercase flex items-center gap-2" onclick="toggleAllah(false)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><polyline points="15 18 9 12 15 6"></polyline></svg> <span id="txt-back-nav">Nazad</span></button>
                <div id="allah-grid" class="space-y-3"></div>
            </div>
        </section>

        <!-- VIEW: ZIKR -->
        <section id="view-zikr" class="view-section text-center space-y-10">
            <div class="bg-white p-10 rounded-[3.5rem] border border-gray-100 shadow-xl">
                <div class="flex gap-2 mb-12">
                    <button id="zb-1" class="flex-1 py-3.5 rounded-2xl bg-black text-[#c5a059] text-[9px] font-black shadow-lg" onclick="setZType('SubhanAllah', 'zb-1')">SubhanAllah</button>
                    <button id="zb-2" class="flex-1 py-3.5 rounded-2xl bg-gray-50 text-gray-300 text-[9px] font-black" onclick="setZType('Elhamdulillah', 'zb-2')">Elhamdulillah</button>
                    <button id="zb-3" class="flex-1 py-3.5 rounded-2xl bg-gray-50 text-gray-300 text-[9px] font-black" onclick="setZType('Allahu Akbar', 'zb-3')">Allahu Akbar</button>
                </div>
                <div class="relative w-64 h-64 mx-auto flex items-center justify-center">
                    <svg class="w-full h-full" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="#f8f8f8" stroke-width="10" />
                        <circle id="zikr-ring" cx="50" cy="50" r="45" fill="none" stroke="#c5a059" stroke-width="10" stroke-dasharray="282.6" stroke-dashoffset="282.6" class="zikr-ring" stroke-linecap="round" />
                    </svg>
                    <div id="zikr-num" class="absolute inset-0 flex items-center justify-center text-7xl font-black">0</div>
                </div>
                <div class="flex gap-4 mt-16">
                    <button class="flex-[3] py-14 rounded-[3rem] bg-[#c5a059] text-black font-black text-5xl shadow-2xl active:scale-95 transition-transform safe-click" onclick="doZikr()">TAP</button>
                    <button class="flex-1 rounded-[2rem] bg-black text-white text-[10px] font-black uppercase" onclick="resetZikr()">Reset</button>
                </div>
            </div>
        </section>

        <!-- VIEW: SCHEDULE -->
        <section id="view-schedule" class="view-section space-y-6">
            <div class="bg-black text-white p-10 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
                <h2 id="sched-date" class="text-3xl font-black italic">--.--</h2>
                <p id="txt-prayer-title" class="text-[10px] text-gray-500 uppercase font-black mt-2">Vremena Molitve</p>
            </div>
            <div id="times-list" class="bg-white rounded-[2.5rem] overflow-hidden divide-y divide-gray-50 border border-gray-100 shadow-sm"></div>
        </section>

        <!-- VIEW: SETTINGS -->
        <section id="view-settings" class="view-section space-y-6">
            <div class="bg-white p-8 rounded-[3rem] border border-gray-100 shadow-sm flex items-center gap-8">
                <div class="relative w-24 h-24 safe-click group" onclick="triggerImg()">
                    <div id="p-img-frame" class="w-full h-full rounded-full bg-black flex items-center justify-center overflow-hidden border-4 border-[#c5a059] shadow-inner">
                        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </div>
                    <div id="p-cam-overlay" class="absolute inset-0 bg-black/60 rounded-full flex items-center justify-center opacity-0 transition-opacity duration-300">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path><circle cx="12" cy="13" r="3"></circle></svg>
                    </div>
                    <input type="file" id="p-file" class="hidden" accept="image/*" onchange="uploadPic(this)">
                </div>
                <div class="flex-1">
                    <input id="p-name-inp" class="font-black text-2xl w-full bg-transparent border-none p-0 focus:ring-0 leading-none text-black mb-2" value="Korisnik" readonly>
                    <button id="p-edit-btn" class="text-[10px] font-black uppercase text-gray-400 border-b-2 border-gray-100 pb-1" onclick="toggleEdit()">Uredi Profil</button>
                </div>
            </div>

            <div class="space-y-4">
                <div class="bg-white p-7 rounded-[2.5rem] shadow-sm border border-gray-100">
                    <p class="text-[10px] font-black text-gray-300 uppercase mb-5 tracking-widest">Jezik / Sprache</p>
                    <div class="grid grid-cols-3 gap-3">
                        <button id="lb-de" class="py-4 rounded-xl font-black text-[10px] bg-gray-50 text-gray-400" onclick="setLang('de')">DE</button>
                        <button id="lb-en" class="py-4 rounded-xl font-black text-[10px] bg-gray-50 text-gray-400" onclick="setLang('en')">EN</button>
                        <button id="lb-bs" class="py-4 rounded-xl font-black text-[10px] bg-black text-[#c5a059]" onclick="setLang('bs')">BS</button>
                    </div>
                </div>
                <div class="bg-white p-7 rounded-[2.5rem] shadow-sm border border-gray-100">
                    <p id="txt-mezheb-lbl" class="text-[10px] font-black text-gray-300 uppercase mb-5 tracking-widest">Mezheb</p>
                    <div class="grid grid-cols-2 gap-3">
                        <button id="mz-h" class="py-5 rounded-2xl font-black text-[10px] bg-black text-[#c5a059]" onclick="setMZ('h')">HANAFI</button>
                        <button id="mz-s" class="py-5 rounded-2xl font-black text-[10px] bg-gray-50 text-gray-400" onclick="setMZ('s')">SHAFI +</button>
                    </div>
                </div>
                <div class="bg-white p-7 rounded-[2.5rem] shadow-sm border border-gray-100">
                    <p id="txt-calc-lbl" class="text-[10px] font-black text-gray-300 uppercase mb-5 tracking-widest">Kalkulacija</p>
                    <select id="p-calc-sel" class="w-full bg-gray-50 p-5 rounded-2xl text-xs font-black outline-none border-none appearance-none" onchange="setCM(this.value)">
                        <option value="13">IZ BiH (Sarajevo)</option>
                        <option value="3">Muslim World League</option>
                        <option value="2">ISNA (North America)</option>
                        <option value="4">Umm Al-Qura (Makkah)</option>
                    </select>
                </div>
            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-sm z-[2000]">
        <nav class="bg-black/95 backdrop-blur-lg text-white rounded-full flex justify-around p-3.5 shadow-2xl border border-white/10">
            <button id="navbtn-h" class="p-4 rounded-full bottom-nav-active" onclick="showView('home')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></button>
            <button id="navbtn-z" class="p-4 rounded-full opacity-30" onclick="showView('zikr')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><path d="M12 12m-3 0a3 3 0 1 0 6 0"></path></svg></button>
            <button id="navbtn-s" class="p-4 rounded-full opacity-30" onclick="showView('schedule')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg></button>
            <button id="navbtn-p" class="p-4 rounded-full opacity-30" onclick="showView('settings')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="7" r="4"></circle></svg></button>
        </nav>
    </div>

    <script>
        const NAMES = [
            {a:"الرَّحْمَنُ",t:"Ar-Rahman",m:"Svemilosni"},{a:"الرَّحِيمُ",t:"Ar-Rahim",m:"Samilosni"},{a:"الْمَلِكُ",t:"Al-Malik",m:"Vladar"},{a:"الْقُدُّوسُ",t:"Al-Quddus",m:"Sveti"},{a:"السَّلامُ",t:"As-Salam",m:"Izvor Mira"},
            {a:"الْمُؤْمِنُ",t:"Al-Mu'min",m:"Pouzdani"},{a:"الْمُهَيْمِنُ",t:"Al-Muhaymin",m:"Zaštitnik"},{a:"الْعَزِيزُ",t:"Al-Aziz",m:"Silni"},{a:"الْجَبَّارُ",t:"Al-Jabbar",m:"Siloviti"},{a:"الْمُتَكَبِّرُ",t:"Al-Mutakabbir",m:"Gordi"},
            {a:"الْخَالِقُ",t:"Al-Khaliq",m:"Stvoritelj"},{a:"الْبَارِئُ",t:"Al-Bari'",m:"Koji divno stvara"},{a:"الْمُصَوِّرُ",t:"Al-Musawwir",m:"Oblikovatelj"},{a:"الْغَفَّارُ",t:"Al-Ghaffar",m:"Koji prašta"},{a:"الْقَهَّارُ",t:"Al-Qahhar",m:"Savladaoc"}
        ];

        let lang = localStorage.getItem('p_lang') || 'bs';
        let zkCounter = parseInt(localStorage.getItem('p_zk')) || 0;
        let pos = null;
        let qBearing = 0;
        let isEdit = false;
        let pTimes = null;

        function updateUI(id, val) { const el = document.getElementById(id); if(el) el.innerText = val; }

        function refresh() {
            const m = {
                de: { h:"KIBLA", z:"ZIKR", p:"GEBETE", pr:"PROFIL", next:"Nächstes", back:"Zurück", prt:"Gebetszeiten", mz:"Rechtsschule", calc:"Kalkulation", act:"Kompass Aktivieren" },
                en: { h:"QIBLA", z:"ZIKR", p:"PRAYERS", pr:"PROFILE", next:"Next", back:"Back", prt:"Prayer Times", mz:"School", calc:"Calculation", act:"Activate Compass" },
                bs: { h:"KIBLA", z:"ZIKR", p:"NAMAZ", pr:"PROFIL", next:"Sljedeći", back:"Nazad", prt:"Vremena Molitve", mz:"Mezheb", calc:"Računanje", act:"Aktiviraj Kompas" }
            }[lang];
            updateUI('tab-home', m.h); updateUI('tab-zikr', m.z); updateUI('tab-schedule', m.p); updateUI('tab-settings', m.pr);
            updateUI('txt-back-nav', m.back); updateUI('txt-prayer-title', m.prt);
            updateUI('txt-mezheb-lbl', m.mz); updateUI('txt-calc-lbl', m.calc);
            updateUI('btn-activate-comp', m.act);

            if(pTimes) {
                const next = calculateNext(pTimes);
                updateUI('home-next-lbl', (m.next || 'Next') + ": " + next.name);
            }

            ['de','en','bs'].forEach(l => {
                const b = document.getElementById('lb-'+l);
                if(b) b.className = l===lang ? "py-4 rounded-xl font-black text-[10px] bg-black text-[#c5a059]" : "py-4 rounded-xl font-black text-[10px] bg-gray-50 text-gray-400";
            });
            const mzSaved = localStorage.getItem('p_mz') || 'h';
            const b1 = document.getElementById('mz-h'); if(b1) b1.className = mzSaved==='h' ? "py-5 rounded-2xl font-black text-[10px] bg-black text-[#c5a059]" : "py-5 rounded-2xl font-black text-[10px] bg-gray-50 text-gray-400";
            const b2 = document.getElementById('mz-s'); if(b2) b2.className = mzSaved==='s' ? "py-5 rounded-2xl font-black text-[10px] bg-black text-[#c5a059]" : "py-5 rounded-2xl font-black text-[10px] bg-gray-50 text-gray-400";
            const sel = document.getElementById('p-calc-sel'); if(sel) sel.value = localStorage.getItem('p_cm') || '13';
        }

        function initSensors() {
            // 1. IMMEDIATE ACTION (Line 1 for iOS)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permission => {
                        if (permission === 'granted') {
                            startCompassAndGPS();
                        } else {
                            alert("Zugriff verweigert. Bitte Sensoren in den Einstellungen erlauben.");
                        }
                    })
                    .catch(err => {
                        alert("Fehler bei der Sensor-Anfrage. Bitte HTTPS verwenden (GitHub).");
                        console.error(err);
                    });
            } else {
                // Fallback for Android/Desktop
                startCompassAndGPS();
            }
        }

        function startCompassAndGPS() {
            const btn = document.getElementById('btn-activate-comp');
            const needle = document.getElementById('needle-group');
            
            // HTTPS Check
            if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
                updateUI('comp-status', 'Fehler: HTTPS erforderlich!');
                alert("Kompass-Sensoren benötigen eine sichere Verbindung (HTTPS).");
            }

            if(btn) btn.style.display = 'none';
            if(needle) needle.style.display = 'flex';
            window.addEventListener('deviceorientation', hOrient, true);

            updateUI('comp-status', 'GPS...');
            navigator.geolocation.getCurrentPosition(async p => {
                pos = p.coords;
                const kl=21.4225*Math.PI/180; const ko=39.8262*Math.PI/180;
                const ml=pos.latitude*Math.PI/180; const mo=pos.longitude*Math.PI/180;
                const y=Math.sin(ko-mo); const x=Math.cos(ml)*Math.tan(kl)-Math.sin(ml)*Math.cos(ko-mo);
                qBearing = (Math.atan2(y, x)*180/Math.PI+360)%360;
                
                loadData(pos.latitude, pos.longitude);
                updateUI('comp-status', lang==='bs'?'Okrećite telefon...':'Drehen / Turn...');
            }, () => alert("GPS Fehler: Bitte Standort aktivieren."));
        }

        function hOrient(e) {
            let h = e.webkitCompassHeading;
            if(!h && e.alpha !== null) h = 360 - e.alpha;
            if(h === undefined || h === null) return;
            const needle = document.getElementById('needle-group');
            const outer = document.getElementById('compass-outer');
            let relative = (qBearing - h + 360) % 360;
            if(needle) needle.style.transform = `rotate(${relative}deg)`;
            if(Math.abs(relative) < 5 || Math.abs(relative) > 355) {
                if(outer) outer.classList.add('aligned');
                updateUI('comp-status', 'KIBLA!');
            } else {
                if(outer) outer.classList.remove('aligned');
                updateUI('comp-status', '...');
            }
            updateUI('comp-deg', Math.round(h) + "°");
        }

        function calculateNext(times) {
            const now = new Date();
            const order = [
                {name: lang==='bs'?'Zora':'Fajr', k:'Fajr'}, {name: lang==='bs'?'Izlazak':'Sunrise', k:'Sunrise'},
                {name: lang==='bs'?'Podne':'Dhuhr', k:'Dhuhr'}, {name: lang==='bs'?'Ikindija':'Asr', k:'Asr'},
                {name: lang==='bs'?'Akšam':'Maghrib', k:'Maghrib'}, {name: lang==='bs'?'Jacija':'Isha', k:'Isha'}
            ];
            for(let p of order) {
                const [hr, min] = times[p.k].split(':'); 
                const pT = new Date(); pT.setHours(hr, min, 0);
                if(pT > now) return { name: p.name, time: times[p.k] };
            }
            return { name: lang==='bs'?'Zora (Sutra)':'Fajr (Tomorrow)', time: times['Fajr'] };
        }

        async function loadData(la, lo) {
            const cm = localStorage.getItem('p_cm') || '13';
            const mz = localStorage.getItem('p_mz') || 'h';
            const r = await fetch(`https://api.aladhan.com/v1/timings?latitude=${la}&longitude=${lo}&method=${cm}&school=${mz==='s'?1:0}`);
            const d = await r.json();
            pTimes = d.data.timings;
            const next = calculateNext(pTimes);
            updateUI('home-time', next.time);
            updateUI('home-next-lbl', (lang==='bs'?'Sljedeći: ':'Next: ') + next.name);
            updateUI('sched-date', d.data.date.readable);
            const list = ['Fajr','Sunrise','Dhuhr','Asr','Maghrib','Isha'];
            document.getElementById('times-list').innerHTML = list.map(l => `<div class="px-10 py-7 flex justify-between items-center bg-white border-b border-gray-50"><span class="text-[9px] font-black text-gray-300 uppercase">${l}</span><span class="text-2xl font-black">${pTimes[l]}</span></div>`).join('');
            
            const req = await fetch(`https://overpass-api.de/api/interpreter?data=[out:json];node["amenity"="place_of_worship"]["religion"="muslim"](around:10000,${la},${lo});out;`);
            const res = await req.json();
            document.getElementById('mosque-list').innerHTML = res.elements.slice(0,5).map(m => `
                <div class="mosque-card p-6 flex justify-between items-center shadow-sm safe-click" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${m.lat},${m.lon}')">
                    <span class="font-black text-xs uppercase text-black font-semibold">${m.tags.name || 'Džamija'}</span>
                    <div class="bg-black text-[#c5a059] p-3 rounded-full"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="15 10 20 15 15 20"></polyline><path d="M4 4v7a4 4 0 0 0 4 4h12"></path></svg></div>
                </div>`).join('');
        }

        function doZikr() {
            zkCounter++; if(zkCounter > 33) zkCounter = 1;
            updateZikrUI(); if(navigator.vibrate) navigator.vibrate(55);
        }
        function resetZikr() { zkCounter = 0; updateZikrUI(); }
        function updateZikrUI() {
            updateUI('zikr-num', zkCounter);
            localStorage.setItem('p_zk', zkCounter);
            const ring = document.getElementById('zikr-ring');
            if(ring) ring.style.strokeDashoffset = 282.6 - (zkCounter / 33 * 282.6);
        }
        function setZType(t, id) {
            document.querySelectorAll('.view-section button[id^="zb-"]').forEach(btn => btn.className = "flex-1 py-3.5 rounded-2xl bg-gray-50 text-gray-300 text-[9px] font-black");
            const b = document.getElementById(id); if(b) b.className = "flex-1 py-3.5 rounded-2xl bg-black text-[#c5a059] text-[9px] font-black shadow-lg";
        }
        function toggleEdit() {
            isEdit = !isEdit;
            const inp = document.getElementById('p-name-inp');
            const btn = document.getElementById('p-edit-btn');
            const cam = document.getElementById('p-cam-overlay');
            if(isEdit) { inp.readOnly = false; inp.focus(); btn.innerText = "SAVE"; if(cam) cam.style.opacity = 1; }
            else { inp.readOnly = true; btn.innerText = "UREDI PROFIL"; if(cam) cam.style.opacity = 0; localStorage.setItem('p_name', inp.value); }
        }
        function triggerImg() { if(isEdit) document.getElementById('p-file').click(); }
        function uploadPic(inp) {
            if(inp.files && inp.files[0]) {
                const r = new FileReader(); r.onload = (e) => {
                    const d = e.target.result;
                    const h = `<img src="${d}" class="w-full h-full object-cover">`;
                    document.getElementById('p-img-frame').innerHTML = h; document.getElementById('head-img').innerHTML = h;
                    localStorage.setItem('p_img', d);
                }; r.readAsDataURL(inp.files[0]);
            }
        }
        function showView(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            const s = document.getElementById('view-'+id); if(s) s.classList.add('active');
            ['h','z','s','p'].forEach(n => {
                const b = document.getElementById('navbtn-'+n);
                if(b) { b.classList.add('opacity-30'); b.classList.remove('bottom-nav-active'); }
            });
            const mMap = {home:'h',zikr:'z',schedule:'s',settings:'p'};
            const act = document.getElementById('navbtn-'+mMap[id]); if(act) { act.classList.remove('opacity-30'); act.classList.add('bottom-nav-active'); }
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
            const tab = document.getElementById('tab-'+id); if(tab) tab.classList.add('nav-active');
        }
        function setLang(l) { lang = l; localStorage.setItem('p_lang', l); refresh(); }
        function setMZ(v) { localStorage.setItem('p_mz', v); location.reload(); }
        function setCM(v) { localStorage.setItem('p_cm', v); location.reload(); }
        function toggleAllah(show) {
            document.getElementById('home-ui').style.display = show ? 'none' : 'block';
            document.getElementById('allah-ui').style.display = show ? 'block' : 'none';
            if(show) {
                document.getElementById('allah-grid').innerHTML = NAMES.map((n, i) => `
                    <div class="bg-white p-6 rounded-2xl border border-gray-100 flex items-center justify-between">
                        <div class="flex items-center gap-4 text-left">
                             <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center font-black text-[9px] text-gray-300">#${i+1}</div>
                             <div><p class="font-black text-black text-xs uppercase">${n.t}</p><p class="text-[9px] text-gray-400 font-bold uppercase">${n.m}</p></div>
                        </div>
                        <span class="text-2xl font-arabic text-[#c5a059]">${n.a}</span>
                    </div>`).join('');
            }
        }
        window.onload = () => {
            updateZikrUI(); refresh();
            const nm = localStorage.getItem('p_name'); if(nm) document.getElementById('p-name-inp').value = nm;
            const im = localStorage.getItem('p_img');
            if(im) {
                const h = `<img src="${im}" class="w-full h-full object-cover">`;
                document.getElementById('p-img-frame').innerHTML = h; document.getElementById('head-img').innerHTML = h;
                const ph = document.getElementById('head-placeholder'); if(ph) ph.style.display = 'none';
            }
        };
    </script>
</body>
</html>
