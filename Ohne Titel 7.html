<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SajdaFinder V2 - Final Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --black: #111111; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: var(--black); -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .font-arabic { font-family: 'Amiri', serif; }
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .nav-active { border-bottom: 4px solid var(--black); color: var(--black) !important; font-weight: 900; }
        .bottom-nav-active { background-color: var(--gold) !important; color: var(--black) !important; transform: scale(1.1); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .counter-circle { width: 220px; height: 220px; border-radius: 50%; border: 12px solid var(--black); display: flex; align-items: center; justify-content: center; font-size: 5rem; font-weight: 900; margin: 0 auto; background: #fff; }
        .zikr-btn-active { background-color: var(--black) !important; color: var(--gold) !important; }
        .safe-click { cursor: pointer !important; touch-action: manipulation; }
        input:focus { outline: none; border: 2px solid var(--gold) !important; }
    </style>
</head>
<body class="pb-32">

    <!-- HEADER -->
    <header class="bg-black text-white px-6 py-6 flex justify-between items-center sticky top-0 z-[1000] shadow-xl">
        <div class="flex items-center gap-3">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            <span class="text-2xl font-black tracking-tighter uppercase">SajdaFinder <span style="color: var(--gold)">V2</span></span>
        </div>
        <div id="head-profile" class="w-10 h-10 rounded-full border-2 border-[#c5a059] flex items-center justify-center overflow-hidden bg-gray-800 safe-click" onclick="showView('settings')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
    </header>

    <!-- TOP NAVIGATION -->
    <nav class="bg-white border-b border-gray-100 flex sticky top-[76px] z-[900] shadow-sm">
        <button id="tab-home" class="flex-1 py-4 text-[10px] uppercase font-bold tracking-widest text-gray-400 nav-active safe-click" onclick="showView('home')">Kibla</button>
        <button id="tab-zikr" class="flex-1 py-4 text-[10px] uppercase font-bold tracking-widest text-gray-400 safe-click" onclick="showView('zikr')">Zikr</button>
        <button id="tab-schedule" class="flex-1 py-4 text-[10px] uppercase font-bold tracking-widest text-gray-400 safe-click" onclick="showView('schedule')">Namaz</button>
        <button id="tab-settings" class="flex-1 py-4 text-[10px] uppercase font-bold tracking-widest text-gray-400 safe-click" onclick="showView('settings')">Profil</button>
    </nav>

    <main class="max-w-xl mx-auto px-6 py-8">

        <!-- VIEW: HOME -->
        <section id="view-home" class="view-section active space-y-6">
            <div id="main-home">
                <div class="bg-white p-6 rounded-2xl border border-gray-100 flex gap-4 shadow-sm mb-6">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="#c5a059" stroke="#c5a059"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                    <div>
                        <h4 id="txt-hadith-title" class="text-black font-black text-[10px] uppercase tracking-widest mb-1">Dnevni Hadis</h4>
                        <p id="txt-hadith-content" class="text-gray-500 italic text-sm">"Najbolji među vama je onaj koji je najbolji prema svojoj porodici."</p>
                    </div>
                </div>

                <div class="bg-black text-white p-8 rounded-3xl mb-8 shadow-2xl overflow-hidden relative">
                    <h2 id="next-prayer-time" class="text-3xl font-black mb-1">--:--</h2>
                    <p id="txt-next-pray" class="text-gray-400 mb-6 font-bold uppercase text-[10px] tracking-widest">Sljedeći Namaz</p>
                    <button id="txt-btn-names" class="bg-[#c5a059] text-black px-8 py-3 rounded-xl font-black text-xs uppercase tracking-widest safe-click" onclick="toggleNames(true)">99 NAMENA ALLAHA</button>
                </div>

                <button class="w-full h-52 bg-white border border-gray-100 rounded-3xl flex flex-col items-center justify-center gap-4 safe-click shadow-sm" onclick="startTracking()">
                    <div id="comp-needle" class="transition-transform duration-[1s]"><svg width="60" height="60" viewBox="0 0 24 24" fill="#c5a059" stroke="#c5a059" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg></div>
                    <span id="loc-status" class="font-black text-xs tracking-widest uppercase text-black">MAP & KIBLA AKTIVIEREN</span>
                </button>
                <div id="mosque-list" class="mt-8 space-y-4"></div>
            </div>

            <div id="names-view" class="hidden">
                    <button class="mb-6 font-black text-xs uppercase tracking-widest flex items-center gap-2 safe-click text-black" onclick="toggleNames(false)"> <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="15 18 9 12 15 6"></polyline></svg> <span id="txt-back">NAZAD</span></button>
                    <div id="names-grid" class="grid gap-3"></div>
            </div>
        </section>

        <!-- VIEW: ZIKR -->
        <section id="view-zikr" class="view-section text-center space-y-8">
            <div class="bg-white rounded-3xl border border-gray-100 p-8 shadow-xl">
                <div class="grid grid-cols-3 gap-2 mb-8">
                    <button id="z-sub" class="py-3 rounded-xl border border-gray-100 text-[9px] font-black uppercase zikr-btn-active safe-click" onclick="setZikr('SubhanAllah', 'z-sub')">SubhanAllah</button>
                    <button id="z-elh" class="py-3 rounded-xl border border-gray-100 text-[9px] font-black uppercase bg-gray-50 text-gray-300 safe-click" onclick="setZikr('Elhamdulillah', 'z-elh')">Elhamdulillah</button>
                    <button id="z-all" class="py-3 rounded-xl border border-gray-100 text-[9px] font-black uppercase bg-gray-50 text-gray-300 safe-click" onclick="setZikr('Allahu Akbar', 'z-all')">Allahu Akbar</button>
                </div>
                <p id="zikr-label" class="text-gray-400 font-black text-[12px] uppercase mb-4 tracking-[0.2em]">SUBHANALLAH</p>
                <div id="zikr-display" class="counter-circle">0</div>
                <div class="flex gap-4 mt-10">
                    <button id="txt-btn-count" class="flex-1 py-10 rounded-3xl font-black text-3xl safe-click shadow-xl" style="background-color: var(--gold); color: black;" onclick="countUp()">BROJI (+)</button>
                    <button id="txt-btn-reset" class="bg-black text-white px-8 rounded-2xl font-black uppercase text-[10px] safe-click" onclick="countRes()">RESET</button>
                </div>
            </div>
        </section>

        <!-- VIEW: Namaz -->
        <section id="view-schedule" class="view-section">
            <div class="bg-white rounded-3xl border border-gray-100 overflow-hidden shadow-xl">
                <div class="bg-black text-white p-8 mb-6"><h2 id="sched-date" class="text-2xl font-black">--.--.----</h2><p id="txt-sched-sub" class="text-[10px] font-bold opacity-60 uppercase tracking-widest mt-1">Vrijeme Namaza</p></div>
                <div id="sched-list" class="divide-y divide-gray-50"></div>
            </div>
        </section>

        <!-- VIEW: SETTINGS -->
        <section id="view-settings" class="view-section space-y-6">
            <div class="bg-white border border-gray-100 rounded-3xl overflow-hidden shadow-xl">
                <div class="p-6 bg-gray-50 border-b border-gray-100 flex justify-between items-center">
                    <span id="txt-prof-head" class="font-black text-[10px] text-gray-400 uppercase tracking-widest">Korisnički profil</span>
                    <button id="ed-btn" class="text-black font-bold text-xs underline safe-click" onclick="toggleEdit()">Bearbeiten</button>
                </div>
                <div class="p-8 flex items-center gap-6">
                    <div class="relative">
                        <div id="prof-box" class="w-20 h-20 rounded-full border-4 border-black bg-gray-100 overflow-hidden flex items-center justify-center">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        </div>
                        <button id="cam-ico" class="absolute bottom-0 right-0 bg-black text-white p-2 rounded-full hidden safe-click" onclick="document.getElementById('img-inp').click()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path></svg></button>
                        <input type="file" id="img-inp" class="hidden" accept="image/*" onchange="loadImg(this)">
                    </div>
                    <div class="flex-1">
                        <input id="uName" class="w-full text-xl font-black bg-transparent border-none p-0 focus:ring-0" value="Kuzelj10" readonly>
                        <input id="uMail" class="w-full text-xs text-gray-400 bg-transparent border-none p-0 focus:ring-0" value="kuzelj10@gmail.com" readonly>
                    </div>
                </div>
            </div>

            <div class="bg-white border border-gray-100 rounded-3xl divide-y divide-gray-50 shadow-sm overflow-hidden font-black">
                <div class="p-6 space-y-4 text-black">
                    <p id="txt-lang-lbl" class="text-[10px] uppercase text-gray-400 tracking-widest">Jezik</p>
                    <div class="grid grid-cols-3 gap-2">
                        <button id="l-de" class="py-2 rounded-xl text-[10px] bg-gray-50 text-gray-300" onclick="setAppLang('de')">DE</button>
                        <button id="l-en" class="py-2 rounded-xl text-[10px] bg-gray-50 text-gray-300" onclick="setAppLang('en')">EN</button>
                        <button id="l-bs" class="py-2 rounded-xl text-[10px] bg-gray-50 text-gray-300" onclick="setAppLang('bs')">BS</button>
                    </div>
                </div>
                <div class="p-6 space-y-4">
                    <p id="txt-calc-lbl" class="text-[10px] uppercase text-gray-400 tracking-widest">Kalkulator</p>
                    <select id="sel-calc" class="w-full bg-gray-50 border border-gray-100 rounded-xl p-4 text-xs font-black safe-click outline-none" onchange="localStorage.setItem('calc', this.value)">
                        <option value="13">IZ BiH</option>
                        <option value="3">Muslim World League</option>
                    </select>
                </div>
            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-sm z-[2000]">
        <nav class="bg-black text-white rounded-full flex justify-around items-center p-3 shadow-2xl border-4 border-white">
            <button id="btn-home" class="p-4 rounded-full bottom-nav-active safe-click" onclick="showView('home')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></button>
            <button id="btn-zikr" class="p-4 rounded-full opacity-40 safe-click" onclick="showView('zikr')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><path d="M12 12m-3 0a3 3 0 1 0 6 0"></path></svg></button>
            <button id="btn-schedule" class="p-4 rounded-full opacity-40 safe-click" onclick="showView('schedule')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg></button>
            <button id="btn-settings" class="p-4 rounded-full opacity-40 safe-click" onclick="showView('settings')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"></circle></svg></button>
        </nav>
    </div>

    <script>
        // --- TRANSLATIONS ---
        const i18n = {
            de: { kibla: "KIBLA", zikr: "ZIKR", namaz: "NAMAZ", profil: "PROFIL", hadithTitle: "Daily Hadith", hadith: "Der Beste unter euch ist derjenige, der am besten zu seiner Familie ist.", nextPray: "Nächstes Gebet", namesBtn: "99 NAMEN ALLAHS", locBtn: "MAP & KIBLA AKTIVIEREN", back: "ZURÜCK", broji: "BROJI (+)", reset: "RESET", edit: "Bearbeiten", save: "Speichern", profHead: "Benutzerprofil", langLbl: "Sprache", calcLbl: "Kalkulator", schedSub: "Gebetszeiten" },
            en: { kibla: "QIBLA", zikr: "ZIKR", namaz: "TIMES", profil: "PROFILE", hadithTitle: "Daily Hadith", hadith: "The best among you are those who are best to their families.", nextPray: "Next Prayer", namesBtn: "99 NAMES OF ALLAH", locBtn: "ACTIVATE MAP & QIBLA", back: "BACK", broji: "COUNT (+)", reset: "RESET", edit: "Edit", save: "Save", profHead: "User Profile", langLbl: "Language", calcLbl: "Calculator", schedSub: "Prayer Times" },
            bs: { kibla: "KIBLA", zikr: "ZIKR", namaz: "NAMAZ", profil: "PROFIL", hadithTitle: "Dnevni Hadis", hadith: "Najbolji među vama je onaj koji je najbolji prema svojoj porodici.", nextPray: "Sljedeći Namaz", namesBtn: "99 ALLAHOVIH IMENA", locBtn: "AKTIVIRAJ KIBLU & MAPU", back: "NAZAD", broji: "BROJI (+)", reset: "RESETOVAJ", edit: "Uredi", save: "Spasi", profHead: "Korisnički profil", langLbl: "Jezik", calcLbl: "Kalkulator", schedSub: "Vrijeme Namaza" }
        };

        let currentLang = localStorage.getItem('lang') || 'de';
        let zk_val = parseInt(localStorage.getItem('zk_val')) || 0;
        let edit_mode = false;
        
        // --- CORE UI LOAD ---
        function renderLang() {
            const t = i18n[currentLang];
            document.getElementById('tab-home').innerText = t.kibla;
            document.getElementById('tab-zikr').innerText = t.zikr;
            document.getElementById('tab-schedule').innerText = t.namaz;
            document.getElementById('tab-settings').innerText = t.profil;
            document.getElementById('txt-hadith-title').innerText = t.hadithTitle;
            document.getElementById('txt-hadith-content').innerText = t.hadith;
            document.getElementById('txt-next-pray').innerText = t.nextPray;
            document.getElementById('txt-btn-names').innerText = t.namesBtn;
            document.getElementById('loc-status').innerText = t.locBtn;
            document.getElementById('txt-back').innerText = t.back;
            document.getElementById('txt-btn-count').innerText = t.broji;
            document.getElementById('txt-btn-reset').innerText = t.reset;
            document.getElementById('txt-prof-head').innerText = t.profHead;
            document.getElementById('ed-btn').innerText = edit_mode ? t.save : t.edit;
            document.getElementById('txt-lang-lbl').innerText = t.langLbl;
            document.getElementById('txt-calc-lbl').innerText = t.calcLbl;
            document.getElementById('txt-sched-sub').innerText = t.schedSub;
            
            ['de','en','bs'].forEach(l => {
                document.getElementById('l-'+l).className = l === currentLang ? "py-2 rounded-xl text-[10px] bg-black text-[#c5a059] safe-click" : "py-2 rounded-xl text-[10px] bg-gray-50 text-gray-300 safe-click";
            });
        }

        function setAppLang(l) {
            currentLang = l;
            localStorage.setItem('lang', l);
            renderLang();
        }

        // --- NAVIGATION ---
        function showView(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('tab-' + id).classList.add('nav-active');
            document.querySelectorAll('.fixed button').forEach(btn => { btn.classList.add('opacity-40'); btn.classList.remove('bottom-nav-active'); });
            document.getElementById('btn-' + id).classList.remove('opacity-40'); document.getElementById('btn-' + id).classList.add('bottom-nav-active');
        }

        // --- ZIKR ---
        document.getElementById('zikr-display').innerText = zk_val;
        function setZikr(lbl, id) {
            document.getElementById('zikr-label').innerText = lbl.toUpperCase();
            document.querySelectorAll('#view-zikr button[id^="z-"]').forEach(b => b.className = "py-3 rounded-xl border border-gray-100 text-[9px] font-black uppercase bg-gray-50 text-gray-300 safe-click");
            document.getElementById(id).className = "py-3 rounded-xl border border-gray-100 text-[9px] font-black uppercase zikr-btn-active safe-click";
        }
        function countUp() { zk_val++; document.getElementById('zikr-display').innerText = zk_val; localStorage.setItem('zk_val', zk_val); if(navigator.vibrate) navigator.vibrate(50); }
        function countRes() { zk_val = 0; document.getElementById('zikr-display').innerText = 0; localStorage.setItem('zk_val', 0); }

        // --- GPS & API (FIXED FOR MOBILE) ---
        async function startTracking() {
            const btn = document.getElementById('loc-status');
            btn.innerText = "LOKALIZUJEM...";
            
            const options = { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 };

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                document.getElementById('comp-needle').style.transform = "rotate(124deg)";
                try {
                    const method = document.getElementById('sel-calc').value;
                    const resp = await fetch(`https://api.aladhan.com/v1/timings?latitude=${latitude}&longitude=${longitude}&method=${method}`);
                    const d = await resp.json();
                    const order = ['Fajr', 'Sunrise', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
                    document.getElementById('sched-list').innerHTML = order.map(n => `<div class="p-6 flex justify-between items-center bg-white"><span class="font-black text-[10px] text-gray-300 uppercase">${n}</span><span class="font-black text-xl text-black">${d.data.timings[n]}</span></div>`).join('');
                    document.getElementById('sched-date').innerText = new Date().toLocaleDateString();
                    document.getElementById('next-prayer-time').innerText = d.data.timings['Dhuhr'];
                    btn.innerText = "KOMPASS AKTIV";
                    
                    const mResp = await fetch(`https://overpass-api.de/api/interpreter?data=[out:json];node["amenity"="place_of_worship"]["religion"="muslim"](around:10000,${latitude},${longitude});out;`);
                    const mData = await mResp.json();
                    document.getElementById('mosque-list').innerHTML = mData.elements.slice(0, 5).map(m => `<div class="bg-white p-5 rounded-2xl border border-gray-50 flex justify-between items-center shadow-sm"><span class="font-black text-[11px] text-black uppercase">${m.tags.name || 'Džamija'}</span><span class="bg-black text-[#c5a059] px-3 py-1 rounded-full text-[9px] font-black uppercase">MAP</span></div>`).join('');
                } catch(e) { btn.innerText = "API FEHLER - LAUNCH REQUIRED"; }
            }, (err) => { btn.innerText = "GPS FEHLER (AKTIVIERE GPS)"; }, options);
        }

        // --- PROFILE ---
        function toggleEdit() {
            edit_mode = !edit_mode;
            renderLang();
            const b = document.getElementById('ed-btn');
            document.getElementById('cam-ico').classList.toggle('hidden', !edit_mode);
            const nameField = document.getElementById('uName');
            const mailField = document.getElementById('uMail');
            [nameField, mailField].forEach(i => {
                i.readOnly = !edit_mode; i.classList.toggle('bg-gray-50', edit_mode); i.classList.toggle('p-2', edit_mode);
            });
            if(edit_mode) {
                nameField.focus();
                // Speichern beim Klick
                localStorage.setItem('uName', nameField.value);
                localStorage.setItem('uMail', mailField.value);
            }
        }
        function loadImg(inp) {
            if (inp.files && inp.files[0]) {
                const r = new FileReader(); r.onload = (e) => {
                    const img = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
                    document.getElementById('prof-box').innerHTML = img; document.getElementById('head-profile').innerHTML = img;
                }; r.readAsDataURL(inp.files[0]);
            }
        }

        // --- NAMES ---
        function toggleNames(show) {
            document.getElementById('main-home').style.display = show ? 'none' : 'block';
            document.getElementById('names-view').style.display = show ? 'block' : 'none';
            if(show) {
                document.getElementById('names-grid').innerHTML = Array(99).fill(0).map((_, i) => `
                    <div class="bg-white p-6 rounded-2xl border border-gray-50 flex justify-between items-center shadow-sm">
                        <span class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center font-black text-[10px] text-gray-300">#${i+1}</span>
                        <div class="text-right"><span class="text-2xl font-arabic text-[#c5a059]">ٱللَّهُ</span></div>
                    </div>`).join('');
            }
        }

        // INIT
        renderLang();
    </script>
</body>
</html>
