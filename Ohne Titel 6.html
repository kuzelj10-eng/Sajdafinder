<!DOCTYPE html>
<html lang="de">
<head>

    <title>SajdaFinder V2 - Final Production</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --black: #111111; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: var(--black); -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .font-arabic { font-family: 'Amiri', serif; }
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-active { border-bottom: 4px solid var(--black); color: var(--black) !important; font-weight: 900; }
        .bottom-nav-active { background-color: var(--gold) !important; color: var(--black) !important; transform: scale(1.1); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .counter-circle { width: 220px; height: 220px; border-radius: 50%; border: 12px solid var(--black); display: flex; align-items: center; justify-content: center; font-size: 5rem; font-weight: 900; margin: 0 auto; background: #fff; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .zikr-btn-active { background-color: var(--black) !important; color: var(--gold) !important; border-color: var(--black) !important; }
        .safe-click { cursor: pointer !important; }
    </style>
</head>
<body class="pb-32">

        <div id="head-pic" class="w-10 h-10 rounded-full border-2 border-[#c5a059] flex items-center justify-center overflow-hidden bg-gray-800 safe-click" onclick="showView('settings')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
    </header>

    <!-- NAVIGATION -->

        <button id="tab-home" class="flex-1 py-4 text-[10px] uppercase font-bold tracking-widest text-gray-400 nav-active safe-click" onclick="showView('home')">Kibla</button>
        <button id="tab-zikr" class="flex-1 py-4 text-[10px] uppercase font-bold tracking-widest text-gray-400 safe-click" onclick="showView('zikr')">Zikr</button>
        <button id="tab-schedule" class="flex-1 py-4 text-[10px] uppercase font-bold tracking-widest text-gray-400 safe-click" onclick="showView('schedule')">Namaz</button>
        <button id="tab-settings" class="flex-1 py-4 text-[10px] uppercase font-bold tracking-widest text-gray-400 safe-click" onclick="showView('settings')">Profil</button>
    </nav>

    <main class="max-w-xl mx-auto px-6 py-8">

        <!-- VIEW: HOME (QIBLA & MOSQUES) -->
        <section id="view-home" class="view-section active space-y-6">
            <div id="main-home">
                <div class="bg-white p-6 rounded-2xl border border-gray-100 flex gap-4 shadow-sm mb-6">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="#c5a059" stroke="#c5a059"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>

                        <p class="text-gray-500 italic text-sm">"Najbolji među vama je onaj koji je najbolji prema svojoj porodici."</p>
                    </div>
                </div>

                <div class="bg-black text-white p-8 rounded-3xl mb-8 shadow-2xl overflow-hidden relative">

                    <p class="text-gray-400 mb-6 font-bold uppercase text-[10px] tracking-widest">Sljedeći Namaz</p>
                    <button class="bg-[#c5a059] text-black px-8 py-3 rounded-xl font-black text-xs uppercase tracking-widest safe-click" onclick="toggleNames(true)">99 NAMENA ALLAHA</button>
                </div>

                <button class="w-full h-52 bg-white border border-gray-100 rounded-3xl flex flex-col items-center justify-center gap-4 safe-click shadow-sm" onclick="startTracking()">

                </button>

                <div id="mosque-list" class="mt-8 space-y-4"></div>
            </div>

            <div id="names-view" class="hidden">
                    <button class="mb-6 font-black text-xs uppercase tracking-widest flex items-center gap-2 safe-click text-black" onclick="toggleNames(false)"> <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="15 18 9 12 15 6"></polyline></svg> NAZAD</button>
                    <div id="names-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            </div>
        </section>

        <!-- VIEW: ZIKR -->
        <section id="view-zikr" class="view-section text-center space-y-8">
            <div class="bg-white rounded-3xl border border-gray-100 p-8 shadow-xl">
                <div class="grid grid-cols-3 gap-2 mb-10">
                    <button id="z-sub" class="py-3 rounded-xl border border-gray-100 text-[9px] font-black uppercase zikr-btn-active safe-click" onclick="setZikr('SubhanAllah', 'z-sub')">SubhanAllah</button>
                    <button id="z-elh" class="py-3 rounded-xl border border-gray-100 text-[9px] font-black uppercase bg-gray-50 text-gray-300 safe-click" onclick="setZikr('Elhamdulillah', 'z-elh')">Elhamdulillah</button>

                <p id="zikr-label" class="text-gray-400 font-black text-[12px] uppercase mb-4 tracking-[0.2em]">SUBHANALLAH</p>
                <div id="zikr-display" class="counter-circle">0</div>

            </div>
        </section>

                <div id="sched-list" class="divide-y divide-gray-50"></div>
            </div>
        </section>

        <!-- VIEW: SETTINGS -->

                    <div class="flex-1">

                        <input id="uMail" class="w-full text-xs text-gray-400 bg-transparent border-none p-0 focus:ring-0" value="kuzelj10@gmail.com" readonly>
                    </div>
                </div>
            </div>

            <div class="bg-white border border-gray-100 rounded-3xl divide-y divide-gray-50 shadow-sm overflow-hidden font-black">
                <div class="p-6 space-y-4">
                    <p class="text-[10px] uppercase text-gray-400 tracking-widest">Jezik / Sprache</p>
                    <div class="grid grid-cols-3 gap-2">
                        <button id="l-de" class="py-2 rounded-xl text-[10px] bg-black text-[#c5a059] safe-click" onclick="setLang('de')">DE</button>
                        <button id="l-en" class="py-2 rounded-xl text-[10px] bg-gray-50 text-gray-300 safe-click" onclick="setLang('en')">EN</button>
                        <button id="l-bs" class="py-2 rounded-xl text-[10px] bg-gray-50 text-gray-300 safe-click" onclick="setLang('bs')">BS</button>
                    </div>
                </div>
                <div class="p-6 space-y-4">
                    <p class="text-[10px] uppercase text-gray-400 tracking-widest">Kalkulator Gebetszeiten</p>
                    <select id="sel-calc" class="w-full bg-gray-50 border border-gray-100 rounded-xl p-4 text-xs font-black safe-click outline-none">
                        <option value="13">IZ BiH (Bosna i Hercegovina)</option>
                        <option value="3">Muslim World League</option>
                        <option value="2">ISNA (North America)</option>
                    </select>
                </div>
                <div class="p-6 space-y-4">
                    <p class="text-[10px] uppercase text-gray-400 tracking-widest">Rechtsschule (Mezheb)</p>
                    <div class="grid grid-cols-2 gap-2 text-[10px]">
                        <button id="m-han" class="py-3 rounded-xl bg-black text-[#c5a059] safe-click" onclick="setMez('han')">HANAFI</button>
                        <button id="m-sha" class="py-3 rounded-xl bg-gray-50 text-gray-300 safe-click" onclick="setMez('sha')">SHAFI / ANDERE</button>
                    </div>
                </div>
            </div>
        </section>

        </nav>

            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('tab-' + id).classList.add('nav-active');
            document.querySelectorAll('.fixed button').forEach(btn => { btn.classList.add('opacity-40'); btn.classList.remove('bottom-nav-active'); });
            document.getElementById('btn-' + id).classList.remove('opacity-40'); document.getElementById('btn-' + id).classList.add('bottom-nav-active');
        }

        document.getElementById('zikr-display').innerText = counter;
        function setZikr(lbl, id) {
            document.getElementById('zikr-label').innerText = lbl.toUpperCase();
            document.querySelectorAll('#view-zikr button[id^="z-"]').forEach(b => b.className = "py-3 rounded-xl border border-gray-100 text-[9px] font-black uppercase bg-gray-50 text-gray-300 safe-click");
            document.getElementById(id).className = "py-3 rounded-xl border border-gray-100 text-[9px] font-black uppercase zikr-btn-active safe-click";
        }
        function countUp() { counter++; document.getElementById('zikr-display').innerText = counter; localStorage.setItem('zk_val', counter); if(navigator.vibrate) navigator.vibrate(50); }
        function countRes() { counter = 0; document.getElementById('zikr-display').innerText = 0; localStorage.setItem('zk_val', 0); }

        function toggleNames(show) {
            document.getElementById('main-home').style.display = show ? 'none' : 'block';
            document.getElementById('names-view').style.display = show ? 'block' : 'none';
            if(show) {
                document.getElementById('names-grid').innerHTML = NAMES_ARRAY.map((n, i) => `
                    <div class="bg-white p-6 rounded-2xl border border-gray-50 flex justify-between items-center shadow-sm">
                        <div class="flex items-center gap-4 text-left">
                            <span class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center font-black text-[10px] text-gray-300 border border-gray-50">${i+1}</span>
                            <div><h4 class="font-black text-sm">${n.t}</h4><p class="text-[10px] text-gray-400 italic">${n.m}</p></div>
                        </div>
                        <span class="text-2xl font-arabic text-[#c5a059]">${n.a}</span>
                    </div>`).join('');
            }
        }

        async function startTracking() {
            const btn = document.getElementById('loc-status');
            btn.innerText = "LOKALIZUJEM...";
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                document.getElementById('comp-needle').style.transform = "rotate(124deg)";
                try {
                    const method = document.getElementById('sel-calc').value;
                    const resp = await fetch(`https://api.aladhan.com/v1/timings?latitude=${latitude}&longitude=${longitude}&method=${method}`);
                    const d = await resp.json();
                    const order = ['Fajr', 'Sunrise', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
                    document.getElementById('sched-list').innerHTML = order.map(n => `<div class="p-6 flex justify-between items-center bg-white"><span class="font-black text-[10px] text-gray-300 uppercase">${n}</span><span class="font-black text-xl text-black">${d.data.timings[n]}</span></div>`).join('');
                    document.getElementById('sched-date').innerText = new Date().toLocaleDateString();
                    document.getElementById('next-prayer-time').innerText = "Dhuhr " + d.data.timings['Dhuhr'];
                    
                    const mResp = await fetch(`https://overpass-api.de/api/interpreter?data=[out:json];node["amenity"="place_of_worship"]["religion"="muslim"](around:10000,${latitude},${longitude});out;`);
                    const mData = await mResp.json();
                    document.getElementById('mosque-list').innerHTML = `<h5 class="text-[10px] font-black uppercase text-gray-400 mt-6 mb-2">Džamije u blizini (bis 10km)</h5>` +
                    mData.elements.slice(0, 8).map(m => `<div class="bg-white p-5 rounded-2xl border border-gray-50 flex justify-between items-center shadow-sm"><span class="font-black text-[11px] text-black uppercase tracking-tight">${m.tags.name || 'Džamija'}</span><span class="bg-black text-[#c5a059] px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest">MAP</span></div>`).join('');
                    btn.innerText = "KOMPASS AKTIV";
                } catch(e) { btn.innerText = "API FEHLER (LAUNCH NECESSARY)"; }
            }, () => { btn.innerText = "GPS FEHLER"; });
        }

        function toggleEdit() {
            isEdit = !isEdit;
            const b = document.getElementById('ed-btn'); b.innerText = isEdit ? "Speichern" : "Bearbeiten";
            document.getElementById('cam-ico').classList.toggle('hidden', !isEdit);
            [document.getElementById('uName'), document.getElementById('uMail')].forEach(i => { i.readOnly = !isEdit; i.classList.toggle('bg-gray-50', isEdit); i.classList.toggle('p-2', isEdit); });
            if(isEdit) document.getElementById('uName').focus();
        }
        function loadImg(inp) {
            if (inp.files && inp.files[0]) {
                const r = new FileReader(); r.onload = (e) => {
                    const img = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
                    document.getElementById('prof-box').innerHTML = img; document.getElementById('head-pic').innerHTML = img;
                }; r.readAsDataURL(inp.files[0]);
            }
        }
        function setLang(l) { ['de','en','bs'].forEach(id => { document.getElementById('l-'+id).className = id === l ? "py-2 rounded-xl text-[10px] bg-black text-[#c5a059] safe-click" : "py-2 rounded-xl text-[10px] bg-gray-50 text-gray-300 safe-click"; }); }
        function setMez(m) { ['han','sha'].forEach(id => { document.getElementById('m-'+id).className = id === m ? "py-3 rounded-xl bg-black text-[#c5a059] safe-click" : "py-3 rounded-xl bg-gray-50 text-gray-300 safe-click"; }); }
    </script>
</body>
</html>
